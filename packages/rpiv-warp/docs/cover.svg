<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-label="rpiv-warp — Native Warp terminal toasts for Pi Agent lifecycle events" preserveAspectRatio="xMidYMid meet">
  <title>rpiv-warp — Native Warp terminal toasts for Pi Agent lifecycle events</title>
  <defs>
    <style>
      .mono { font-family: 'JetBrains Mono', 'Fira Code', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace; }
      .ui { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif; }
      .ink { fill: #F4EFE6; }
      .muted { fill: #8C8678; }
      .dim { fill: #4F4A41; }
      .accent { fill: #FF7A3D; }
      .mint { fill: #6FD0B8; }
      .gold { fill: #E0B956; }
    </style>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="2" seed="31"/>
      <feColorMatrix values="0 0 0 0 0.96  0 0 0 0 0.94  0 0 0 0 0.88  0 0 0 0.04 0"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="55%" stop-color="#070605" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C1813"/>
      <stop offset="100%" stop-color="#14110D"/>
    </linearGradient>
    <filter id="winShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="toastShadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <clipPath id="wclip"><rect x="64" y="56" width="1152" height="688" rx="12"/></clipPath>
  </defs>

  <rect width="1280" height="800" fill="#070605"/>
  <rect width="1280" height="800" filter="url(#grain)" opacity="0.45"/>
  <rect width="1280" height="800" fill="url(#vignette)"/>

  <rect x="64" y="56" width="1152" height="688" rx="12" fill="#0E0D0B" filter="url(#winShadow)"/>

  <g clip-path="url(#wclip)">
    <rect x="64" y="56" width="1152" height="44" fill="url(#titleGrad)"/>
    <line x1="64" y1="100" x2="1216" y2="100" stroke="#2A2620"/>
    <line x1="64" y1="57" x2="1216" y2="57" stroke="#3A352D" stroke-opacity="0.6"/>
    <circle cx="92"  cy="78" r="7" fill="#FF5F57"/>
    <circle cx="120" cy="78" r="7" fill="#FFBD2E"/>
    <circle cx="148" cy="78" r="7" fill="#28C840"/>
    <text class="mono muted" x="640" y="84" font-size="14" letter-spacing="1.4" text-anchor="middle">~/rpiv-mono &#8212; pi &#8212; rpiv-warp</text>

    <text class="mono mint" x="120" y="190" font-size="46" font-weight="700"># rpiv-warp</text>
    <text class="mono muted" x="120" y="226" font-size="20">Native Warp toasts for Pi lifecycle events.</text>

    <text class="mono muted" x="120" y="354" font-size="14" letter-spacing="1.6">[hook]</text>
    <text class="mono ink" x="208" y="354" font-size="14">agent_end</text>
    <text class="mono muted" x="120" y="394" font-size="14" letter-spacing="1.6">[bytes]</text>
    <text class="mono" x="208" y="394" font-size="14"><tspan class="accent" font-weight="700">ESC</tspan> <tspan class="muted">]</tspan> <tspan class="accent" font-weight="700">777</tspan> <tspan class="muted">;</tspan> <tspan class="muted">notify</tspan> <tspan class="muted">;</tspan> <tspan class="mint">&#8230;</tspan> <tspan class="accent" font-weight="700">BEL</tspan></text>
    <text class="mono muted" x="120" y="434" font-size="14" letter-spacing="1.6">[warp]</text>
    <text class="mono" x="208" y="434" font-size="14"><tspan class="mint">&#10003;</tspan> <tspan class="muted">delivered</tspan></text>

    <line x1="500" y1="430" x2="600" y2="430" stroke="#FF7A3D" stroke-width="1.6" stroke-dasharray="4 4"/>
    <path d="M592 422 L606 430 L592 438" fill="none" stroke="#FF7A3D" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>

    <g transform="translate(620 310)" filter="url(#toastShadow)">
      <rect x="0" y="0" width="540" height="248" rx="14" fill="#15120E" stroke="#3A352D" stroke-width="1.2"/>

      <rect x="28" y="32" width="68" height="68" rx="10" fill="#F4EFE6"/>
      <text class="ui" x="62" y="80" font-size="34" font-weight="800" fill="#15120E" text-anchor="middle" letter-spacing="-1">P!</text>
      <circle cx="92" cy="96" r="13" fill="#15120E"/>
      <circle cx="92" cy="96" r="10" fill="#E0B956"/>
      <path d="M 92 86 A 10 10 0 0 1 92 106 Z" fill="#15120E" opacity="0.5"/>

      <g transform="translate(124 38)" stroke="#8C8678" stroke-width="1.4" fill="none" stroke-linecap="round">
        <circle cx="2.5" cy="2.5" r="1.6" fill="#8C8678" stroke="none"/>
        <circle cx="2.5" cy="13.5" r="1.6" fill="#8C8678" stroke="none"/>
        <circle cx="11" cy="2.5" r="1.6" fill="#8C8678" stroke="none"/>
        <path d="M2.5 4 V12 M11 4 V6.5 Q11 9 8.5 9 H5"/>
      </g>
      <text class="ui muted" x="148" y="50" font-size="14">main</text>
      <text class="ui ink" x="124" y="86" font-size="22" font-weight="700">Pi needs attention</text>
      <text class="ui muted" x="124" y="118" font-size="17">Waiting for your answer</text>

      <line x1="28" y1="158" x2="512" y2="158" stroke="#2A2620"/>

      <text class="ui muted" x="124" y="200" font-size="15">Open conversation</text>

      <rect x="294" y="184" width="30" height="26" rx="5" fill="#221E18" stroke="#3A352D" stroke-width="1"/>
      <text class="ui ink" x="309" y="202" font-size="14" font-weight="600" text-anchor="middle">&#8593;</text>
      <rect x="332" y="184" width="30" height="26" rx="5" fill="#221E18" stroke="#3A352D" stroke-width="1"/>
      <text class="ui ink" x="347" y="202" font-size="14" font-weight="600" text-anchor="middle">&#8984;</text>
      <rect x="370" y="184" width="30" height="26" rx="5" fill="#221E18" stroke="#3A352D" stroke-width="1"/>
      <text class="ui ink" x="385" y="202" font-size="14" font-weight="600" text-anchor="middle">G</text>
    </g>

    <text class="mono muted" x="120" y="624" font-size="13" letter-spacing="2.4">SILENT NO-OP OUTSIDE WARP &#183; OPT-IN &#183; OSC 777 EMITTER &#183; NO /dev/tty: OK</text>

    <rect x="64" y="708" width="1152" height="36" fill="url(#titleGrad)"/>
    <line x1="64" y1="708" x2="1216" y2="708" stroke="#2A2620"/>
    <text class="mono" font-size="14" y="731" letter-spacing="1">
      <tspan x="92" class="accent" font-weight="700">&#9612; rpiv-warp</tspan>
      <tspan dx="14" class="dim">&#9474;</tspan>
      <tspan dx="14" class="mint">TERM_PROGRAM=WarpTerminal</tspan>
      <tspan dx="14" class="dim">&#9474;</tspan>
      <tspan dx="14" class="muted">pi 0.9.4</tspan>
      <tspan dx="14" class="dim">&#9474;</tspan>
      <tspan dx="14" class="muted">npm:@juicesharp/rpiv-warp</tspan>
    </text>
  </g>

  <rect x="64" y="56" width="1152" height="688" rx="12" fill="none" stroke="#3A352D" stroke-width="1"/>
</svg>
