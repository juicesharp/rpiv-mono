<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-label="rpiv-ask-user-question — Structured clarifying questions instead of guessing" preserveAspectRatio="xMidYMid meet">
  <title>rpiv-ask-user-question — Structured clarifying questions instead of guessing</title>
  <defs>
    <style>
      .mono   { font-family: 'JetBrains Mono', 'Fira Code', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace; }
      .ink    { fill: #F4EFE6; }
      .paper  { fill: #0E0D0B; }
      .muted  { fill: #7A7468; }
      .dim    { fill: #4A463F; }
      .accent { fill: #FF7A3D; }
      .mint   { fill: #6FD0B8; }
      .rule   { stroke: #2A2620; }
      .rule-bright { stroke: #FF7A3D; }
    </style>

    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="2" seed="17"/>
      <feColorMatrix values="0 0 0 0 0.96
                             0 0 0 0 0.94
                             0 0 0 0 0.88
                             0 0 0 0.06 0"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0 H0 V32" fill="none" stroke="#161411" stroke-width="0.5"/>
    </pattern>
    <pattern id="dots" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="0.6" fill="#231F1A"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#0E0D0B" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <!-- Canvas -->
  <rect width="1280" height="800" class="paper"/>
  <rect width="1280" height="800" fill="url(#grid)" opacity="0.55"/>
  <rect width="1280" height="800" fill="url(#dots)" opacity="0.4"/>
  <rect width="1280" height="800" filter="url(#grain)" opacity="0.5"/>
  <rect width="1280" height="800" fill="url(#vignette)"/>

  <!-- Crop marks -->
  <g class="rule-bright" stroke-width="1" fill="none" opacity="0.95">
    <path d="M40 56 L56 56 M56 40 L56 56"/>
    <path d="M1240 56 L1224 56 M1224 40 L1224 56"/>
    <path d="M40 744 L56 744 M56 760 L56 744"/>
    <path d="M1240 744 L1224 744 M1224 760 L1224 744"/>
  </g>

  <!-- Top spec strip -->
  <line x1="64" y1="56" x2="1216" y2="56" class="rule" stroke-width="1"/>
  <text class="mono muted" x="64"   y="44" font-size="10.5" letter-spacing="2.4">@JUICESHARP &#183; PI AGENT EXTENSION &#183; NO. 004 &#8211; ASK</text>
  <text class="mono muted" x="1216" y="44" font-size="10.5" letter-spacing="2.4" text-anchor="end">MIT &#183; v0.9 &#183; 1280 &#215; 800</text>

  <!-- Logotype (two lines, same 116px) -->
  <text class="mono ink" x="64" y="186" font-size="116" font-weight="700" letter-spacing="-4">rpiv<tspan class="accent">-</tspan>ask-</text>
  <text class="mono ink" x="64" y="296" font-size="116" font-weight="700" letter-spacing="-4">user-question</text>
  <line x1="64" y1="312" x2="178" y2="312" class="rule-bright" stroke-width="2"/>
  <text class="mono muted" x="64" y="342" font-size="16" letter-spacing="0.5">Let the model ask you structured clarifying questions.</text>
  <text class="mono dim"   x="64" y="366" font-size="11" letter-spacing="2.2">TABBED DIALOG &#183; PREVIEW PANE &#183; MULTI-SELECT &#183; PER-OPTION NOTES</text>

  <!-- FIG header -->
  <text class="mono muted" x="64"   y="402" font-size="10.5" letter-spacing="2.4">FIG. 01 &#8212; STRUCTURED QUESTIONNAIRE</text>
  <text class="mono muted" x="1216" y="402" font-size="10.5" letter-spacing="2.4" text-anchor="end">ask_user_question()</text>
  <line x1="64" y1="412" x2="1216" y2="412" class="rule" stroke-width="0.75"/>

  <!-- ===== HERO: stylised tabbed dialog ===== -->
  <!-- Dialog frame -->
  <g transform="translate(64 432)">
    <rect x="0" y="0" width="1152" height="118" fill="#13110D" stroke="#2A2620" stroke-width="1"/>

    <!-- Tab bar -->
    <g>
      <rect x="0"   y="0" width="180" height="22" fill="#0E0D0B" stroke="#2A2620" stroke-width="0.75"/>
      <rect x="180" y="0" width="180" height="22" fill="#15120E"/>
      <rect x="360" y="0" width="180" height="22" fill="#15120E"/>
      <rect x="0"   y="22" width="540" height="2" fill="#FF7A3D"/>
      <text class="mono ink"   x="14"  y="15" font-size="10.5" letter-spacing="1.6" font-weight="700">[ Q1 &#183; FRAMEWORK ]</text>
      <text class="mono muted" x="194" y="15" font-size="10.5" letter-spacing="1.6">  Q2 &#183; STORE</text>
      <text class="mono muted" x="374" y="15" font-size="10.5" letter-spacing="1.6">  SUBMIT</text>
    </g>

    <!-- Question prompt -->
    <text class="mono accent" x="14" y="46" font-size="11" letter-spacing="1.8">?</text>
    <text class="mono ink"    x="32" y="46" font-size="13">Which framework should the migrated component target?</text>

    <!-- LEFT: options -->
    <g transform="translate(14 56)">
      <text class="mono muted" x="0" y="14" font-size="11.5">  &#9675; React</text>
      <!-- selected -->
      <text class="mono mint"  x="0" y="32" font-size="11.5" font-weight="700">&#9210; Vue</text>
      <text class="mono muted" x="0" y="50" font-size="11.5">  &#9675; Svelte</text>
      <text class="mono dim"   x="0" y="68" font-size="11">  &#8230; Other (free text)</text>
    </g>

    <!-- vertical separator between options and preview -->
    <line x1="328" y1="28" x2="328" y2="110" class="rule" stroke-width="0.75" stroke-dasharray="2 3"/>

    <!-- RIGHT: side-by-side preview pane -->
    <g transform="translate(344 30)">
      <text class="mono dim" x="0" y="0" font-size="9.5" letter-spacing="2.2">PREVIEW &#8226; vue example</text>
      <rect x="0" y="6" width="468" height="76" fill="#0E0D0B" stroke="#221E18" stroke-width="0.6"/>
      <text class="mono mint"  x="10" y="22" font-size="10.5">&lt;script setup&gt;</text>
      <text class="mono ink"   x="10" y="36" font-size="10.5">import { ref } from <tspan class="accent">"vue"</tspan></text>
      <text class="mono ink"   x="10" y="50" font-size="10.5">const count = ref(0)</text>
      <text class="mono mint"  x="10" y="64" font-size="10.5">&lt;/script&gt;</text>
      <text class="mono muted" x="10" y="78" font-size="9.5">&#8230;</text>
    </g>

    <!-- Key chips (footer of dialog) -->
    <g transform="translate(14 96)">
      <rect x="0"   y="0" width="50" height="14" fill="#15120E" stroke="#2A2620" stroke-width="0.6"/>
      <rect x="58"  y="0" width="60" height="14" fill="#15120E" stroke="#2A2620" stroke-width="0.6"/>
      <rect x="126" y="0" width="60" height="14" fill="#15120E" stroke="#2A2620" stroke-width="0.6"/>
      <rect x="194" y="0" width="40" height="14" fill="#15120E" stroke="#2A2620" stroke-width="0.6"/>
      <rect x="242" y="0" width="34" height="14" fill="#15120E" stroke="#2A2620" stroke-width="0.6"/>
      <text class="mono muted" x="6"   y="10" font-size="9" letter-spacing="1.2">Tab</text>
      <text class="mono muted" x="64"  y="10" font-size="9" letter-spacing="1.2">Space</text>
      <text class="mono muted" x="132" y="10" font-size="9" letter-spacing="1.2">Enter</text>
      <text class="mono muted" x="200" y="10" font-size="9" letter-spacing="1.2">Esc</text>
      <text class="mono muted" x="248" y="10" font-size="9" letter-spacing="1.2">n</text>
      <text class="mono dim"   x="290" y="10" font-size="9" letter-spacing="1.5">SWITCH &#8226; TOGGLE &#8226; SUBMIT &#8226; CLOSE &#8226; NOTE</text>
    </g>
  </g>

  <!-- Footer -->
  <line x1="64" y1="744" x2="1216" y2="744" class="rule" stroke-width="1"/>
  <text class="mono muted" x="64" y="768" font-size="11" letter-spacing="2">
    <tspan class="accent">&#9654;</tspan>  pi install npm:@juicesharp/rpiv-ask-user-question
  </text>
  <text class="mono muted" x="1216" y="768" font-size="11" letter-spacing="2.4" text-anchor="end">
    ASK &#8594; ANSWER &#8594; CONFIRM
  </text>
</svg>
