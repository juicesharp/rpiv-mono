<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-label="rpiv-todo — Persistent todo overlay that survives reload and compaction" preserveAspectRatio="xMidYMid meet">
  <title>rpiv-todo — Persistent todo overlay that survives reload and compaction</title>
  <defs>
    <style>
      .mono { font-family: 'JetBrains Mono', 'Fira Code', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace; }
      .ink { fill: #F4EFE6; }
      .muted { fill: #8C8678; }
      .dim { fill: #4F4A41; }
      .accent { fill: #FF7A3D; }
      .mint { fill: #6FD0B8; }
      .gold { fill: #E0B956; }
    </style>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="2" seed="23"/>
      <feColorMatrix values="0 0 0 0 0.96  0 0 0 0 0.94  0 0 0 0 0.88  0 0 0 0.04 0"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="55%" stop-color="#070605" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C1813"/>
      <stop offset="100%" stop-color="#14110D"/>
    </linearGradient>
    <filter id="winShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <clipPath id="wclip"><rect x="64" y="56" width="1152" height="688" rx="12"/></clipPath>
  </defs>

  <rect width="1280" height="800" fill="#070605"/>
  <rect width="1280" height="800" filter="url(#grain)" opacity="0.45"/>
  <rect width="1280" height="800" fill="url(#vignette)"/>

  <rect x="64" y="56" width="1152" height="688" rx="12" fill="#0E0D0B" filter="url(#winShadow)"/>

  <g clip-path="url(#wclip)">
    <rect x="64" y="56" width="1152" height="44" fill="url(#titleGrad)"/>
    <line x1="64" y1="100" x2="1216" y2="100" stroke="#2A2620"/>
    <line x1="64" y1="57" x2="1216" y2="57" stroke="#3A352D" stroke-opacity="0.6"/>
    <circle cx="92"  cy="78" r="7" fill="#FF5F57"/>
    <circle cx="120" cy="78" r="7" fill="#FFBD2E"/>
    <circle cx="148" cy="78" r="7" fill="#28C840"/>
    <text class="mono muted" x="640" y="84" font-size="14" letter-spacing="1.4" text-anchor="middle">~/rpiv-mono &#8212; pi &#8212; rpiv-todo</text>

    <text class="mono mint" x="120" y="208" font-size="32">&#9679;  Todos (2/7)</text>

    <text class="mono" x="160" y="270" font-size="24"><tspan class="muted">&#9500;&#9472; </tspan><tspan class="dim" text-decoration="line-through">&#10003;  Create DemoTodo domain entity</tspan></text>
    <text class="mono" x="160" y="306" font-size="24"><tspan class="muted">&#9500;&#9472; </tspan><tspan class="dim" text-decoration="line-through">&#10003;  Create IDemoTodoRepository interface</tspan></text>

    <text class="mono" x="160" y="362" font-size="24" xml:space="preserve"><tspan class="muted">&#9500;&#9472; </tspan><tspan class="gold">&#9680;</tspan>  <tspan class="ink">Create DemoTodoRepository in Infrastructure</tspan>  <tspan class="dim">(creating impl&#8230;)</tspan></text>

    <text class="mono" x="160" y="408" font-size="24" xml:space="preserve"><tspan class="muted">&#9500;&#9472; </tspan><tspan class="muted">&#9675;</tspan>  <tspan class="ink">Create DemoTodoService in Application layer</tspan></text>
    <text class="mono" x="160" y="448" font-size="24" xml:space="preserve"><tspan class="muted">&#9500;&#9472; </tspan><tspan class="muted">&#9675;</tspan>  <tspan class="ink">Create DemoTodosController in Web.Api</tspan></text>
    <text class="mono" x="160" y="488" font-size="24" xml:space="preserve"><tspan class="muted">&#9500;&#9472; </tspan><tspan class="muted">&#9675;</tspan>  <tspan class="ink">Register DemoTodo services in DI container</tspan></text>
    <text class="mono" x="160" y="528" font-size="24" xml:space="preserve"><tspan class="muted">&#9492;&#9472; </tspan><tspan class="muted">&#9675;</tspan>  <tspan class="ink">Write unit and integration tests</tspan></text>

    <text class="mono muted" x="120" y="624" font-size="13" letter-spacing="2.4">SURVIVES /reload + /compact &#183; LIVE OVERLAY &#183; DEPENDENCY GRAPH</text>

    <rect x="64" y="708" width="1152" height="36" fill="url(#titleGrad)"/>
    <line x1="64" y1="708" x2="1216" y2="708" stroke="#2A2620"/>
    <text class="mono" font-size="14" y="731" letter-spacing="1">
      <tspan x="92" class="accent" font-weight="700">&#9612; rpiv-todo</tspan>
      <tspan dx="14" class="dim">&#9474;</tspan>
      <tspan dx="14" class="mint">2/7 done</tspan>
      <tspan dx="14" class="dim">&#9474;</tspan>
      <tspan dx="14" class="muted">pi 0.9.4</tspan>
      <tspan dx="14" class="dim">&#9474;</tspan>
      <tspan dx="14" class="muted">npm:@juicesharp/rpiv-todo</tspan>
    </text>
  </g>

  <rect x="64" y="56" width="1152" height="688" rx="12" fill="none" stroke="#3A352D" stroke-width="1"/>
</svg>
