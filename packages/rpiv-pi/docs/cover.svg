<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-label="rpiv-pi — Skill-based development workflow for Pi Agent" preserveAspectRatio="xMidYMid meet">
  <title>rpiv-pi — Skill-based development workflow for Pi Agent</title>
  <defs>
    <style>
      .mono { font-family: 'JetBrains Mono', 'Fira Code', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace; }
      .ink { fill: #F4EFE6; }
      .muted { fill: #8C8678; }
      .dim { fill: #4F4A41; }
      .accent { fill: #FF7A3D; }
      .mint { fill: #6FD0B8; }
    </style>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="2" seed="11"/>
      <feColorMatrix values="0 0 0 0 0.96  0 0 0 0 0.94  0 0 0 0 0.88  0 0 0 0.04 0"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="55%" stop-color="#070605" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C1813"/>
      <stop offset="100%" stop-color="#14110D"/>
    </linearGradient>
    <filter id="winShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <clipPath id="wclip"><rect x="64" y="56" width="1152" height="688" rx="12"/></clipPath>
  </defs>

  <rect width="1280" height="800" fill="#070605"/>
  <rect width="1280" height="800" filter="url(#grain)" opacity="0.45"/>
  <rect width="1280" height="800" fill="url(#vignette)"/>

  <rect x="64" y="56" width="1152" height="688" rx="12" fill="#0E0D0B" filter="url(#winShadow)"/>

  <g clip-path="url(#wclip)">
    <rect x="64" y="56" width="1152" height="44" fill="url(#titleGrad)"/>
    <line x1="64" y1="100" x2="1216" y2="100" stroke="#2A2620"/>
    <line x1="64" y1="57" x2="1216" y2="57" stroke="#3A352D" stroke-opacity="0.6"/>
    <circle cx="92"  cy="78" r="7" fill="#FF5F57"/>
    <circle cx="120" cy="78" r="7" fill="#FFBD2E"/>
    <circle cx="148" cy="78" r="7" fill="#28C840"/>
    <text class="mono muted" x="640" y="84" font-size="14" letter-spacing="1.4" text-anchor="middle">~/rpiv-mono &#8212; pi &#8212; rpiv-pi</text>

    <text class="mono mint" x="120" y="190" font-size="46" font-weight="700"># rpiv-pi</text>
    <text class="mono muted" x="120" y="226" font-size="20">Skill-based development workflow for Pi Agent.</text>

    <line x1="200" y1="430" x2="1080" y2="430" stroke="#FF7A3D" stroke-width="2"/>
    <path d="M1070 421 L1086 430 L1070 439" fill="none" stroke="#FF7A3D" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>

    <g transform="translate(200 430)">
      <circle r="14" fill="#0E0D0B" stroke="#FF7A3D" stroke-width="2"/>
      <circle r="5" fill="#FF7A3D"/>
      <text class="mono dim" x="0" y="-32" font-size="12" letter-spacing="1.4" text-anchor="middle">01</text>
      <text class="mono ink" x="0" y="52" font-size="16" letter-spacing="1.4" text-anchor="middle" font-weight="700">DISCOVER</text>
    </g>
    <g transform="translate(376 430)">
      <circle r="14" fill="#0E0D0B" stroke="#FF7A3D" stroke-width="2"/>
      <circle r="5" fill="#FF7A3D"/>
      <text class="mono dim" x="0" y="-32" font-size="12" letter-spacing="1.4" text-anchor="middle">02</text>
      <text class="mono ink" x="0" y="52" font-size="16" letter-spacing="1.4" text-anchor="middle" font-weight="700">RESEARCH</text>
    </g>
    <g transform="translate(552 430)">
      <circle r="14" fill="#0E0D0B" stroke="#FF7A3D" stroke-width="2"/>
      <circle r="5" fill="#FF7A3D"/>
      <text class="mono dim" x="0" y="-32" font-size="12" letter-spacing="1.4" text-anchor="middle">03</text>
      <text class="mono ink" x="0" y="52" font-size="16" letter-spacing="1.4" text-anchor="middle" font-weight="700">DESIGN</text>
    </g>
    <g transform="translate(728 430)">
      <circle r="14" fill="#0E0D0B" stroke="#FF7A3D" stroke-width="2"/>
      <circle r="5" fill="#FF7A3D"/>
      <text class="mono dim" x="0" y="-32" font-size="12" letter-spacing="1.4" text-anchor="middle">04</text>
      <text class="mono ink" x="0" y="52" font-size="16" letter-spacing="1.4" text-anchor="middle" font-weight="700">PLAN</text>
    </g>
    <g transform="translate(904 430)">
      <circle r="14" fill="#0E0D0B" stroke="#FF7A3D" stroke-width="2"/>
      <circle r="5" fill="#FF7A3D"/>
      <text class="mono dim" x="0" y="-32" font-size="12" letter-spacing="1.4" text-anchor="middle">05</text>
      <text class="mono ink" x="0" y="52" font-size="16" letter-spacing="1.4" text-anchor="middle" font-weight="700">IMPLEMENT</text>
    </g>
    <g transform="translate(1080 430)">
      <circle r="16" fill="#13110D" stroke="#6FD0B8" stroke-width="2"/>
      <circle r="6" fill="#6FD0B8"/>
      <text class="mono dim" x="0" y="-32" font-size="12" letter-spacing="1.4" text-anchor="middle">06</text>
      <text class="mono mint" x="0" y="52" font-size="16" letter-spacing="1.4" text-anchor="middle" font-weight="700">VALIDATE</text>
    </g>

    <text class="mono dim" x="640" y="612" font-size="13" letter-spacing="2.4" text-anchor="middle">CHAINED AI SKILLS &#183; 12 NAMED SUBAGENTS &#183; thoughts/shared/</text>

    <rect x="64" y="708" width="1152" height="36" fill="url(#titleGrad)"/>
    <line x1="64" y1="708" x2="1216" y2="708" stroke="#2A2620"/>
    <text class="mono" font-size="14" y="731" letter-spacing="1">
      <tspan x="92" class="accent" font-weight="700">&#9612; rpiv-pi</tspan>
      <tspan dx="14" class="dim">&#9474;</tspan>
      <tspan dx="14" class="mint">main &#9679;</tspan>
      <tspan dx="14" class="dim">&#9474;</tspan>
      <tspan dx="14" class="muted">pi 0.9.4</tspan>
      <tspan dx="14" class="dim">&#9474;</tspan>
      <tspan dx="14" class="muted">npm:@juicesharp/rpiv-pi</tspan>
    </text>
  </g>

  <rect x="64" y="56" width="1152" height="688" rx="12" fill="none" stroke="#3A352D" stroke-width="1"/>
</svg>
