name: CI

on:
  push:
    paths-ignore:
      - 'packages/rpiv-site/**'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        node: ["22", "24"]
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - run: npm run check

      - run: npm run coverage -- --reporter=default --reporter=json --outputFile=test-results.json

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: coverage-node-${{ matrix.node }}
          path: coverage/
          if-no-files-found: ignore

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always() && matrix.node == '22'
        with:
          name: test-results
          path: test-results.json
          if-no-files-found: error

      - name: Upload coverage to Codecov
        if: matrix.node == '22'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0 (v6 tag was retagged onto this commit upstream)
        with:
          files: coverage/lcov.info
          use_oidc: true
          fail_ci_if_error: true

  badges:
    name: update test-count badge
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: test-results

      - name: Build badge JSON
        run: |
          PASSED=$(jq -r '.numPassedTests' test-results.json)
          TOTAL=$(jq -r '.numTotalTests' test-results.json)
          if [ "$PASSED" = "$TOTAL" ]; then COLOR=brightgreen; else COLOR=red; fi
          mkdir -p out
          jq -n --arg msg "$PASSED / $TOTAL" --arg color "$COLOR" \
            '{schemaVersion:1, label:"tests", message:$msg, color:$color}' \
            > out/tests.json
          cat out/tests.json

      - name: Publish to badges branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan badges-tmp
          git rm -rf --cached . >/dev/null 2>&1 || true
          find . -mindepth 1 -maxdepth 1 \
            ! -name .git ! -name out ! -name test-results.json -exec rm -rf {} +
          mv out/tests.json tests.json
          rm -rf out test-results.json
          git add tests.json
          git commit -m "chore(badges): update test-count badge"
          git push -f origin badges-tmp:badges
